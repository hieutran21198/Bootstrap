inputs:
  nixpkgs:
    url: github:cachix/devenv-nixpkgs/rolling
  go-overlay:
    url: github:purpleclay/go-overlay
    inputs:
      nixpkgs:
        follows: nixpkgs
  git-hooks:
    url: github:cachix/git-hooks.nix
    inputs:
      nixpkgs:
        follows: nixpkgs
allow_unfree: true
imports:
  - ./packages/nix
secretspec:
  enable: true
  provider: protonpass
  profile: development
