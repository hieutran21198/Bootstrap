name: vulncheck

on:
  pull_request:
    branches:
      - main
  push:
    branches:
      - main

permissions:
  contents: read

concurrency:
  group: vulncheck-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  govulncheck:
    name: govulncheck (go.work modules)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: services/portal/go.mod
      - name: Reconstruct go.work (gitignored; Nix-generated locally)
        run: |
          set -euo pipefail
          go work init
          # Auto-discover all workspace modules via go.mod files. This is
          # intentional for a security scanner: a hardcoded list could silently
          # miss a new module, creating a blind spot. The exclusions avoid noise
          # from vendored deps and test fixtures.
          for gomod in $(find . -name go.mod -not -path '*/vendor/*' -not -path '*/testdata/*'); do
            go work use "$(dirname "$gomod")"
          done
          cat go.work
      - name: Run govulncheck on all workspace modules
        run: |
          set -euo pipefail
          go install golang.org/x/vuln/cmd/govulncheck@latest
          failed=0
          for dir in $(go list -m -f '{{.Dir}}'); do
            echo "=== govulncheck: $dir ==="
            if ! (cd "$dir" && govulncheck ./...); then
              failed=1
            fi
          done
          exit "$failed"
