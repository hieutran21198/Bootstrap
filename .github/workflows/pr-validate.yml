name: PR validation

# Enforces the Git conventions (docs/conventions/git/) on every pull request,
# using the same git-guard validator the local pre-commit hooks run — so the
# rules cannot drift between a developer's machine and CI.
# Also lints markdown consistency with the same ruleset as the local hook.
# Only raw evidence assets (.assets/) and generated/vendored files are excluded.

on:
  pull_request:
    types: [opened, edited, synchronize, reopened]

permissions:
  contents: read

concurrency:
  group: pr-validate-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  git-conventions:
    name: Git conventions
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: tools/go.mod

      - name: Build git-guard
        working-directory: tools
        run: go build -o "$RUNNER_TEMP/git-guard" ./validators/git-guard

      - name: Validate PR title
        env:
          PR_TITLE: ${{ github.event.pull_request.title }}
        run: '"$RUNNER_TEMP/git-guard" pr-title "$PR_TITLE"'

      - name: Validate branch name
        env:
          HEAD_REF: ${{ github.head_ref }}
        run: '"$RUNNER_TEMP/git-guard" branch-name "$HEAD_REF"'

      - name: Validate commit subjects (advisory)
        continue-on-error: true
        env:
          BASE_REF: ${{ github.base_ref }}
        run: |
          git fetch --no-tags --depth=100 origin "$BASE_REF"
          "$RUNNER_TEMP/git-guard" commit-range FETCH_HEAD HEAD

  markdownlint:
    name: Markdown consistency
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Lint markdown
        run: |
          cat > .markdownlint-cli2.jsonc << 'MARKDOWNLINT_EOF'
          {
            "config": {
              "MD004": false,
              "MD009": false,
              "MD010": false,
              "MD013": false,
              "MD024": false,
              "MD028": false,
              "MD033": false,
              "MD034": false,
              "MD041": false,
              "MD047": false,
              "MD049": false,
              "MD051": false,
              "MD058": false,
              "MD060": false
            },
            "ignores": [
              "**/.claude/",
              "**/.codegraph/",
              "**/.devenv/",
              "**/.git/",
              "**/.opencode/",
              "**/.worktrees/",
              "**/node_modules/",
              "**/*.assets/",
              "CLAUDE.md"
            ]
          }
          MARKDOWNLINT_EOF
          npx --yes markdownlint-cli2@0.22.1 "**/*.md"
