name: Deploy workspace docs

# Builds the Docusaurus site in apps/workspace-docs and publishes it to
# GitHub Pages (https://hieutran21198.github.io/Bootstrap/).

on:
  push:
    branches:
      - main
  workflow_dispatch:

# Allow only one concurrent deployment; do not cancel an in-progress run so a
# running deploy can finish.
concurrency:
  group: pages
  cancel-in-progress: false

# Minimal permissions required by actions/deploy-pages.
permissions:
  contents: read
  pages: write
  id-token: write

defaults:
  run:
    working-directory: apps/workspace-docs

jobs:
  build:
    name: Build site
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: apps/workspace-docs/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Type check
        run: npm run typecheck

      - name: Build
        run: npm run build

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: apps/workspace-docs/build

  deploy:
    name: Deploy to GitHub Pages
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy
        id: deployment
        uses: actions/deploy-pages@v4
