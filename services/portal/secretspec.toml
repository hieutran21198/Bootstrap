[project]
name = "portal"
revision = "1.0"

[profiles.default]
# Postgres role passwords — managed by secretspec so real
# credentials never live in devenv.nix or .env files.
POSTGRES_ADMIN_PASSWORD = { description = "Postgres admin role password (database owner, superuser)", required = true }
POSTGRES_WRITER_PASSWORD = { description = "Postgres writer role password (CRUD privileges)", required = true }
POSTGRES_READER_PASSWORD = { description = "Postgres reader role password (SELECT only)", required = true }
POSTGRES_SYSTEM_READER_PASSWORD = { description = "Postgres system_reader role password (cross-tenant SELECT via the system RLS scope, NOBYPASSRLS; ADR-0009). Required so the system_read_* RLS policies can be applied by migrations.", required = true }
POSTGRES_PORT = { description = "Postgres port, default=5432", required = true }

[profiles.local]
# Inherits all secrets from default, just adding defaults.
# POSTGRES_ADMIN_PASSWORD = { required = false, default = "admin" }
# POSTGRES_WRITER_PASSWORD = { required = false, default = "writer" }
# POSTGRES_READER_PASSWORD = { required = false, default = "reader" }
POSTGRES_PORT = { required = false, default = "5432" }

[profiles.development]
# internal team.
